    <!-- Firestore Score Code - /free se aaya to +5 -->
    <script type="module">
      import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js'
      import { getFirestore, doc, getDoc, setDoc, updateDoc, increment } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js'
      
      const firebaseConfig = {
        apiKey: "TERA_API_KEY_YAHA_DAAL",
        authDomain: "srsmhdoctors-score.firebaseapp.com",
        projectId: "srsmhdoctors-score",
      };
      
      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);
      
      let userId = localStorage.getItem('userId');
      if(!userId){
          userId = 'user_' + Date.now() + Math.random().toString(36).substr(2, 9);
          localStorage.setItem('userId', userId);
      }
      
      let addScore = 0;
      let ref = document.referrer;
      if(ref.includes('/free')) addScore = 5;
      else if(ref.includes('/about')) addScore = 3;
      
      if(addScore > 0){
          const userRef = doc(db, "users", userId);
          getDoc(userRef).then(userSnap => {
              if(userSnap.exists()){
                  updateDoc(userRef, {score: increment(addScore)});
              } else {
                  setDoc(userRef, {score: addScore, createdAt: new Date()});
              }
          });
      }
    </script>
